spring:
  application:
    name: lab08-spring-boot-rest
  liquibase:
    change-log: classpath:/db/changelog/changelog-master.xml
  datasource:
    url: jdbc:mysql://localhost:3306/internetMailing?createDatabaseIfNotExist=true
